<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Website</title>
    <link rel="stylesheet" href="output.css">
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
</head>

<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Header -->
    <h1 class="text-4xl font-bold text-blue-600 mb-4">Welcome to Demo Website</h1>
    <h1 class="text-4xl font-bold text-blue-600 mb-4">Welcome to Demo Website</h1>
    <h1 class="text-4xl font-bold text-blue-600 mb-4">V8</h1>

    <!-- Register Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/demo/service-worker.js').then(reg => {

                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;

                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'activated') {
                            location.reload(); // reload page automatically
                        }
                    });

                });

            });
        }
    </script>
</body>

</html>
